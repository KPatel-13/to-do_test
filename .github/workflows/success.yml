# This workflow simulates a successful operational job in an upstream service.
# It is manually triggered for demo purposes.
# No notification should be sent when the job succeeds.

name: Simulator Success

on:
  workflow_dispatch:
    inputs:
      job_name:
        description: "Operational job name to simulate"
        required: true
        default: "daily-data-sync"

permissions:
  contents: read

jobs:
  run-successful-job:
    name: Run successful simulated job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Show selected inputs
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Job: ${{ inputs.job_name }}"

      - name: Run simulated job successfully
        env:
          SIM_MODE: success
        run: |
          python scripts/run_job.py

      - name: Notify failure endpoint
        if: failure()
        env:
          WORKFLOW_FAILURE_ENDPOINT: ${{ secrets.WORKFLOW_FAILURE_ENDPOINT }}
          WORKFLOW_FAILURE_SECRET: ${{ secrets.WORKFLOW_FAILURE_SECRET }}
        run: |
          echo "This step should never run because the simulated job succeeded."
          exit 1
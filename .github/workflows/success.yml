# This workflow simulates a successful operational job in an upstream service.
# It is manually triggered from the Actions tab.
# A success payload is still sent to the central service, which can discard it.

name: Simulator Success

'on':
  workflow_dispatch:
    inputs:
      job_name:
        description: "Operational job name to simulate"
        required: true
        default: "daily-data-sync"

permissions:
  contents: read

jobs:
  run-successful-job:
    name: Run successful simulated job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show selected inputs
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Job: ${{ inputs.job_name }}"

      - name: Run simulated job successfully
        env:
          SIM_MODE: success
        run: |
          python scripts/job_sim.py

      - name: Show generated result
        run: |
          cat job_result.json

      - name: Notify central service
        env:
          WORKFLOW_FAILURE_ENDPOINT: ${{ secrets.WORKFLOW_FAILURE_ENDPOINT }}
          WORKFLOW_FAILURE_SECRET: ${{ secrets.WORKFLOW_FAILURE_SECRET }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path("job_result.json").read_text(encoding="utf-8"))
          payload = {
              "source": "github-actions",
              "repository": "${{ github.repository }}",
              "workflowName": "${{ github.workflow }}",
              "jobName": "${{ inputs.job_name }}",
              "status": result["status"],
              "summary": result["summary"],
              "details": result["details"],
              "severity": result["severity"],
              "errorCode": result["errorCode"],
          }
          Path("payload.json").write_text(json.dumps(payload), encoding="utf-8")
          PY

          cat payload.json

          curl --fail --show-error --silent \
            -X POST "${WORKFLOW_FAILURE_ENDPOINT}" \
            -H "Content-Type: application/json" \
            -H "X-Workflow-Secret: ${WORKFLOW_FAILURE_SECRET}" \
            --data @payload.json
